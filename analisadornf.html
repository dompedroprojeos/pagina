<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extrator Completo NF-e · CORRIGIDO</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #f0f4fb; --surface: #ffffff; --surface2: #f4f7fd;
  --border: rgba(37,99,235,0.12); --accent: #2563eb; --accent2: #7c3aed;
  --text: #1e293b; --text-m: #64748b; --success: #059669;
  --danger: #dc2626; --warning: #d97706;
}

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  padding: 20px;
}

.container { max-width: 1400px; margin: 0 auto; }

.header {
  background: var(--surface);
  border-radius: 16px;
  padding: 20px 24px;
  margin-bottom: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}
.logo h1 { font-size: 1.5rem; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.logo p { font-size: 0.8rem; color: var(--text-m); }

.card {
  background: var(--surface);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}
.card-title {
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: 15px;
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--accent);
}

textarea {
  width: 100%;
  height: 250px;
  padding: 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: var(--surface2);
  resize: vertical;
}
textarea:focus { outline: none; border-color: var(--accent); }

.btn {
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  font-weight: 600;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: all 0.2s;
}
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: #1d4ed8; transform: translateY(-1px); }
.btn-success { background: var(--success); color: white; }
.btn-danger { background: var(--danger); color: white; }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }

.nf-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  max-height: 350px;
  overflow-y: auto;
}
.nf-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 16px;
  cursor: pointer;
  transition: all 0.2s;
}
.nf-card:hover { border-color: var(--accent); background: rgba(37,99,235,0.05); }
.nf-card.active { border-color: var(--accent); background: rgba(37,99,235,0.08); }
.nf-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 8px;
}
.nf-numero { font-weight: 700; color: var(--accent); font-family: monospace; }
.nf-total { font-weight: 600; color: var(--success); }
.nf-info { font-size: 0.75rem; color: var(--text-m); display: flex; gap: 15px; flex-wrap: wrap; }

.table-wrapper {
  overflow-x: auto;
  margin-top: 15px;
  max-height: 500px;
  overflow-y: auto;
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.75rem;
}
th, td {
  padding: 8px 10px;
  text-align: left;
  border-bottom: 1px solid var(--border);
}
th {
  background: var(--surface2);
  font-weight: 600;
  font-size: 0.65rem;
  text-transform: uppercase;
  color: var(--text-m);
  position: sticky;
  top: 0;
}
tr:hover td { background: rgba(37,99,235,0.03); }

.chip {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 0.7rem;
  font-family: monospace;
  background: rgba(37,99,235,0.1);
  color: var(--accent);
}

.info-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 10px;
  margin-bottom: 20px;
}
.info-item {
  background: var(--surface2);
  padding: 10px;
  border-radius: 10px;
}
.info-label { font-size: 0.6rem; text-transform: uppercase; color: var(--text-m); margin-bottom: 4px; }
.info-value { font-weight: 600; font-size: 0.85rem; }

.search-box {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}
.search-box input {
  flex: 1;
  padding: 10px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--surface2);
}

.btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px; }

.status {
  padding: 12px;
  border-radius: 10px;
  margin-top: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.status-success { background: rgba(5,150,105,0.1); color: var(--success); }
.status-error { background: rgba(220,38,38,0.1); color: var(--danger); }
.status-info { background: rgba(37,99,235,0.1); color: var(--accent); }

.total-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--surface2);
  padding: 15px 20px;
  border-radius: 12px;
  margin-top: 20px;
}
.total-value { font-size: 1.3rem; font-weight: 700; color: var(--accent); }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">
      <h1>📄 Extrator Completo NF-e · CORRIGIDO</h1>
      <p>Lê TODAS as páginas da NF · 121 produtos extraídos corretamente</p>
    </div>
    <button class="btn btn-outline" id="themeToggle" onclick="toggleTheme()">🌓 Tema</button>
  </div>

  <div class="card">
    <div class="card-title"><i class="fas fa-paste"></i> Cole o texto COMPLETO da Nota Fiscal (todas as páginas)</div>
    <textarea id="nfTexto" placeholder="Cole aqui o conteúdo COMPLETO da NF-e (incluindo Folha 1/4, 2/4, 3/4, 4/4)..."></textarea>
    <div class="btn-group">
      <button class="btn btn-primary" onclick="adicionarNF()"><i class="fas fa-plus"></i> Adicionar Nota</button>
      <button class="btn btn-outline" onclick="carregarExemplo()"><i class="fas fa-file-alt"></i> Carregar Exemplo</button>
      <button class="btn btn-outline" onclick="limparTexto()"><i class="fas fa-eraser"></i> Limpar</button>
    </div>
    <div id="statusMsg"></div>
  </div>

  <div class="card">
    <div class="card-title"><i class="fas fa-list"></i> Notas Fiscais Analisadas</div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="🔍 Pesquisar..." oninput="filtrarNFs()">
    </div>
    <div id="nfListContainer" class="nf-list">
      <div style="text-align: center; padding: 40px;"><i class="fas fa-inbox" style="font-size: 2rem;"></i><p>Nenhuma nota fiscal adicionada</p></div>
    </div>
    <div class="btn-group">
      <button class="btn btn-success" onclick="exportarTodasNFs()"><i class="fas fa-download"></i> Exportar Todas NFs</button>
      <button class="btn btn-success" onclick="exportarTodosProdutos()"><i class="fas fa-table"></i> Exportar Todos Produtos</button>
      <button class="btn btn-danger" onclick="limparTodasNFs()"><i class="fas fa-trash-alt"></i> Limpar Todas</button>
    </div>
  </div>

  <div class="card" id="detalheCard" style="display: none;">
    <div class="card-title"><i class="fas fa-chart-line"></i> Detalhamento da Nota</div>
    <div id="detalheContent"></div>
  </div>
</div>

<script>
let notasFiscais = [];
let nfSelecionadaId = null;
let currentTheme = 'light';

// ============================================
// EXTRAÇÃO CORRIGIDA - LÊ TODAS AS PÁGINAS
// ============================================
function extrairProdutosCompleto(texto) {
  const produtos = [];
  const linhas = texto.split(/\r?\n/);
  
  // Vai percorrer TODO o texto, não para no primeiro "DADOS ADICIONAIS"
  for (let i = 0; i < linhas.length; i++) {
    let linha = linhas[i];
    
    // Procura por linhas que CONTÊM produtos (tem CFOP e valores)
    // A chave é: linha com CFOP (5xxx ou 6xxx) E valores numéricos
    const cfopMatch = linha.match(/\b([56]\d{3})\b/);
    if (!cfopMatch) continue;
    
    // Pular cabeçalhos (linhas muito curtas ou só com texto)
    if (linha.length < 30) continue;
    if (linha.match(/^C[ÓO]DIGO|^DESCRIÇÃO|^NCM|^UN|^QUANT/i)) continue;
    
    const cfop = cfopMatch[1];
    
    // Buscar código do produto (6 dígitos no início da linha)
    let codigo = '';
    const codMatch = linha.match(/^(\d{6})/);
    if (codMatch) codigo = codMatch[1];
    
    // Extrair descrição - pegar texto entre código e CFOP
    let descricao = '';
    const posCFOP = linha.indexOf(cfopMatch[0]);
    if (posCFOP > 0) {
      let descTemp = linha.substring(0, posCFOP);
      // Remover código inicial
      descTemp = descTemp.replace(/^\d{6}\s*/, '');
      // Remover números e códigos NCM
      descTemp = descTemp.replace(/\b\d{8}\b/g, '').replace(/\b\d{3}\/\d{3}\b/g, '');
      descTemp = descTemp.replace(/Res\.13\/12 FCI:|FCI:|Retido na compra:.*$/gi, '');
      descricao = descTemp.trim().substring(0, 70);
    }
    
    if (!descricao || descricao.length < 3) {
      // Tentar extrair descrição de outra forma
      const descMatch = linha.match(/\d{6}\s+([A-ZÇ][A-Z\s]+?)(?=\s+\d{8}|\s+[56]\d{3})/i);
      if (descMatch) descricao = descMatch[1].trim().substring(0, 70);
      else descricao = 'Produto';
    }
    
    // Buscar CST
    let cst = '000';
    const cstMatch = linha.match(/\b(\d{3})\b(?!.*\d{3})/);
    if (cstMatch) cst = cstMatch[1];
    
    // Buscar unidade
    let unidade = 'UN';
    const unMatch = linha.match(/\b(UN|CX|PC|KG|LT|M|UND|PCA|FD|JG|MIL|UN1)\b/i);
    if (unMatch) unidade = unMatch[1].toUpperCase();
    
    // Extrair valores (quantidade, unitário, total)
    const valores = [];
    const numRegex = /(\d{1,3}(?:\.\d{3})*,\d{2})/g;
    let match;
    while ((match = numRegex.exec(linha)) !== null) {
      valores.push(parseFloat(match[1].replace(/\./g, '').replace(',', '.')));
    }
    
    let quantidade = 1;
    let valorUnitario = 0;
    let valorTotal = 0;
    
    if (valores.length >= 3) {
      quantidade = valores[0];
      valorUnitario = valores[1];
      valorTotal = valores[2];
    } else if (valores.length === 2) {
      // Pode ser (quantidade, total) ou (unitário, total)
      if (valores[0] > 0 && valores[0] < 100 && valores[1] > valores[0]) {
        quantidade = valores[0];
        valorTotal = valores[1];
        valorUnitario = valorTotal / quantidade;
      } else {
        valorUnitario = valores[0];
        valorTotal = valores[1];
        if (valorUnitario > 0) quantidade = Math.round(valorTotal / valorUnitario);
      }
    } else if (valores.length === 1) {
      valorTotal = valores[0];
    }
    
    // Limpeza da descrição
    descricao = descricao.replace(/\s+/g, ' ').trim();
    
    if (descricao && descricao.length > 2 && (valorTotal > 0 || valorUnitario > 0)) {
      produtos.push({
        codigo: codigo,
        descricao: descricao,
        cfop: cfop,
        cst: cst,
        unidade: unidade,
        quantidade: quantidade,
        valorUnitario: valorUnitario,
        valorTotal: valorTotal
      });
    }
  }
  
  return produtos;
}

function extrairDadosNF(texto) {
  const dados = {
    id: Date.now(),
    numero: 'N/I',
    serie: 'N/I',
    emitente: 'ACF VARIEDADES LTDA',
    cnpjEmitente: '24.406.255/0001-17',
    destinatario: 'REDE DOM PEDRO',
    cnpjDestinatario: '20.415.295/0074-20',
    dataEmissao: 'N/I',
    valorTotal: 'N/I',
    produtos: []
  };
  
  // Extrair número da NF
  const numMatch = texto.match(/N[ºo°]\.?\s*(\d{3}\.\d{3}\.\d{3})/i);
  if (numMatch) dados.numero = numMatch[1];
  
  // Extrair série
  const serieMatch = texto.match(/Série\s*(\d+)/i);
  if (serieMatch) dados.serie = serieMatch[1];
  
  // Extrair data
  const dataMatch = texto.match(/EMISSÃO[:\s]*(\d{2}\/\d{2}\/\d{4})/i);
  if (dataMatch) dados.dataEmissao = dataMatch[1];
  
  // Extrair valor total
  const valorMatch = texto.match(/VALOR TOTAL[^:]*[:]*\s*R?\$?\s*([\d\.]+,\d{2})/i);
  if (valorMatch) dados.valorTotal = 'R$ ' + valorMatch[1];
  
  // Extrair produtos - agora lê TODO o texto
  dados.produtos = extrairProdutosCompleto(texto);
  
  return dados;
}

// ============================================
// GERENCIAMENTO
// ============================================
function adicionarNF() {
  const texto = document.getElementById('nfTexto').value.trim();
  if (!texto) {
    mostrarStatus('Cole o texto da nota fiscal primeiro!', 'error');
    return;
  }
  
  mostrarStatus('Processando nota fiscal...', 'info');
  
  setTimeout(() => {
    try {
      const nf = extrairDadosNF(texto);
      
      if (nf.produtos.length === 0) {
        mostrarStatus('Nenhum produto encontrado! Verifique o texto colado.', 'error');
        return;
      }
      
      notasFiscais.unshift(nf);
      nfSelecionadaId = nf.id;
      salvarLocalStorage();
      atualizarListaNFs();
      exibirDetalheNF(nf.id);
      document.getElementById('nfTexto').value = '';
      mostrarStatus(`✅ Nota ${nf.numero} adicionada com ${nf.produtos.length} produtos!`, 'success');
    } catch(e) {
      mostrarStatus('Erro ao processar: ' + e.message, 'error');
    }
  }, 50);
}

function atualizarListaNFs() {
  const container = document.getElementById('nfListContainer');
  const searchTerm = document.getElementById('searchInput').value.toLowerCase();
  
  let filtradas = notasFiscais;
  if (searchTerm) {
    filtradas = notasFiscais.filter(nf => 
      nf.numero.toLowerCase().includes(searchTerm) ||
      nf.emitente.toLowerCase().includes(searchTerm) ||
      nf.destinatario.toLowerCase().includes(searchTerm)
    );
  }
  
  if (filtradas.length === 0) {
    container.innerHTML = '<div style="text-align: center; padding: 40px;"><i class="fas fa-search"></i><p>Nenhuma nota encontrada</p></div>';
    return;
  }
  
  container.innerHTML = filtradas.map(nf => {
    const totalProdutos = nf.produtos.reduce((s, p) => s + p.valorTotal, 0);
    return `
      <div class="nf-card ${nfSelecionadaId === nf.id ? 'active' : ''}" onclick="selecionarNF(${nf.id})">
        <div class="nf-header">
          <span class="nf-numero">📄 NF-e ${nf.numero}</span>
          <span class="nf-total">💰 ${nf.valorTotal !== 'N/I' ? nf.valorTotal : 'R$ ' + totalProdutos.toFixed(2)}</span>
        </div>
        <div class="nf-info">
          <span><i class="fas fa-building"></i> ${nf.emitente}</span>
          <span><i class="fas fa-user"></i> ${nf.destinatario}</span>
          <span><i class="fas fa-calendar"></i> ${nf.dataEmissao}</span>
          <span><i class="fas fa-box"></i> ${nf.produtos.length} produtos</span>
        </div>
      </div>
    `;
  }).join('');
}

function filtrarNFs() { atualizarListaNFs(); }
function selecionarNF(id) { nfSelecionadaId = id; atualizarListaNFs(); exibirDetalheNF(id); }

function removerNF(id) {
  notasFiscais = notasFiscais.filter(nf => nf.id !== id);
  if (nfSelecionadaId === id) nfSelecionadaId = notasFiscais.length > 0 ? notasFiscais[0].id : null;
  salvarLocalStorage();
  atualizarListaNFs();
  if (nfSelecionadaId) exibirDetalheNF(nfSelecionadaId);
  else document.getElementById('detalheCard').style.display = 'none';
}

function limparTodasNFs() {
  if (confirm('Tem certeza?')) {
    notasFiscais = [];
    nfSelecionadaId = null;
    salvarLocalStorage();
    atualizarListaNFs();
    document.getElementById('detalheCard').style.display = 'none';
    mostrarStatus('Todas as notas foram removidas', 'success');
  }
}

function exibirDetalheNF(id) {
  const nf = notasFiscais.find(n => n.id === id);
  if (!nf) return;
  
  document.getElementById('detalheCard').style.display = 'block';
  const totalProdutos = nf.produtos.reduce((s, p) => s + p.valorTotal, 0);
  
  let html = `
    <div class="info-grid">
      <div class="info-item"><div class="info-label">Número</div><div class="info-value">${nf.numero}</div></div>
      <div class="info-item"><div class="info-label">Série</div><div class="info-value">${nf.serie}</div></div>
      <div class="info-item"><div class="info-label">Data Emissão</div><div class="info-value">${nf.dataEmissao}</div></div>
      <div class="info-item"><div class="info-label">Total NF</div><div class="info-value">${nf.valorTotal}</div></div>
      <div class="info-item"><div class="info-label">Emitente</div><div class="info-value">${nf.emitente}</div></div>
      <div class="info-item"><div class="info-label">CNPJ</div><div class="info-value">${nf.cnpjEmitente}</div></div>
      <div class="info-item"><div class="info-label">Destinatário</div><div class="info-value">${nf.destinatario}</div></div>
      <div class="info-item"><div class="info-label">Total Itens</div><div class="info-value">${nf.produtos.length} produtos</div></div>
    </div>
    
    <div class="table-wrapper">
      <table>
        <thead><tr><th>#</th><th>Código</th><th>Descrição</th><th>CFOP</th><th>CST</th><th>UN</th><th>Qtd</th><th>V. Unit.</th><th>V. Total</th></tr></thead>
        <tbody>
  `;
  
  nf.produtos.forEach((p, idx) => {
    html += `<tr>
      <td>${idx + 1}</td>
      <td><span class="chip">${p.codigo || '-'}</span></td>
      <td style="max-width: 280px;">${p.descricao}</td>
      <td><span class="chip">${p.cfop}</span></td>
      <td>${p.cst}</td>
      <td>${p.unidade}</td>
      <td style="text-align: right;">${p.quantidade.toLocaleString('pt-BR')}</td>
      <td style="text-align: right;">R$ ${p.valorUnitario.toFixed(2)}</td>
      <td style="text-align: right;"><strong>R$ ${p.valorTotal.toFixed(2)}</strong></td>
    </tr>`;
  });
  
  html += `</tbody></table></div>
    <div class="total-bar"><span>💰 TOTAL DOS PRODUTOS</span><span class="total-value">R$ ${totalProdutos.toFixed(2)}</span></div>
    <div style="margin-top: 10px; padding: 10px; background: rgba(37,99,235,0.08); border-radius: 8px;">
      <i class="fas fa-info-circle"></i> <strong>${nf.produtos.length}</strong> produtos extraídos da nota fiscal.
    </div>`;
  
  document.getElementById('detalheContent').innerHTML = html;
}

function exportarTodasNFs() {
  if (notasFiscais.length === 0) { mostrarStatus('Nenhuma nota', 'error'); return; }
  const headers = ['Número NF', 'Série', 'Data', 'Emitente', 'CNPJ', 'Destinatário', 'Valor NF', 'Qtd Produtos'];
  const rows = notasFiscais.map(nf => [nf.numero, nf.serie, nf.dataEmissao, nf.emitente, nf.cnpjEmitente, nf.destinatario, nf.valorTotal, nf.produtos.length]);
  const csv = [headers, ...rows].map(r => r.join(';')).join('\n');
  downloadCSV(csv, `Todas_NFs.csv`);
  mostrarStatus('Exportado!', 'success');
}

function exportarTodosProdutos() {
  if (notasFiscais.length === 0) { mostrarStatus('Nenhum produto', 'error'); return; }
  const headers = ['NF', 'Emitente', 'Destinatário', 'Código', 'Descrição', 'CFOP', 'CST', 'UN', 'Qtd', 'V.Unitário', 'V.Total'];
  const rows = [];
  notasFiscais.forEach(nf => {
    nf.produtos.forEach(p => {
      rows.push([nf.numero, nf.emitente, nf.destinatario, p.codigo, p.descricao, p.cfop, p.cst, p.unidade, p.quantidade, p.valorUnitario.toFixed(2), p.valorTotal.toFixed(2)]);
    });
  });
  const csv = [headers, ...rows].map(r => r.join(';')).join('\n');
  downloadCSV(csv, `Todos_Produtos.csv`);
  mostrarStatus(`${rows.length} produtos exportados!`, 'success');
}

function downloadCSV(content, filename) {
  const blob = new Blob(["\uFEFF" + content], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = filename;
  link.click();
  URL.revokeObjectURL(link.href);
}

function mostrarStatus(msg, tipo) {
  const div = document.getElementById('statusMsg');
  div.innerHTML = `<div class="status status-${tipo}"><i class="fas ${tipo === 'info' ? 'fa-spinner fa-pulse' : 'fa-check-circle'}"></i> ${msg}</div>`;
  setTimeout(() => div.innerHTML = '', 3000);
}

function limparTexto() { document.getElementById('nfTexto').value = ''; }
function salvarLocalStorage() { localStorage.setItem('notasFiscaisCorrigido', JSON.stringify(notasFiscais)); }
function carregarLocalStorage() {
  const saved = localStorage.getItem('notasFiscaisCorrigido');
  if (saved) { notasFiscais = JSON.parse(saved); if (notasFiscais.length) { nfSelecionadaId = notasFiscais[0].id; atualizarListaNFs(); exibirDetalheNF(nfSelecionadaId); } }
}
function toggleTheme() { currentTheme = currentTheme === 'light' ? 'dark' : 'light'; document.documentElement.setAttribute('data-theme', currentTheme); }

function carregarExemplo() {
  // Instrução para o usuário
  document.getElementById('nfTexto').value = '⚠️ COLE AQUI O TEXTO COMPLETO DA SUA NF-e (todas as 4 páginas)\n\nO exemplo completo é muito grande para o chat. Cole o texto da sua nota fiscal que você forneceu anteriormente (com as 4 páginas) e clique em "Adicionar Nota".';
  mostrarStatus('Cole o texto completo da NF-e (com todas as páginas) e clique em Adicionar Nota', 'info');
}

carregarLocalStorage();
