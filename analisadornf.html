<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extrator NF-e · Universal · ACF + IPIRANGA</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #f0f4fb; --surface: #ffffff; --surface2: #f4f7fd;
  --border: rgba(37,99,235,0.12); --accent: #2563eb; --accent2: #7c3aed;
  --text: #1e293b; --text-m: #64748b; --success: #059669;
  --danger: #dc2626; --warning: #d97706; --info: #3b82f6;
}

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  padding: 20px;
}

.container { max-width: 1600px; margin: 0 auto; }

.header {
  background: var(--surface);
  border-radius: 16px;
  padding: 20px 24px;
  margin-bottom: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  flex-wrap: wrap;
  gap: 15px;
}
.logo h1 { font-size: 1.5rem; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.logo p { font-size: 0.8rem; color: var(--text-m); }

.card {
  background: var(--surface);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}
.card-title {
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: 15px;
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--accent);
}

textarea {
  width: 100%;
  height: 350px;
  padding: 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: var(--surface2);
  resize: vertical;
}
textarea:focus { outline: none; border-color: var(--accent); }

.btn {
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  font-weight: 600;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: all 0.2s;
}
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: #1d4ed8; transform: translateY(-1px); }
.btn-success { background: var(--success); color: white; }
.btn-danger { background: var(--danger); color: white; }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }

.nf-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  max-height: 400px;
  overflow-y: auto;
}
.nf-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 16px;
  cursor: pointer;
  transition: all 0.2s;
}
.nf-card:hover { border-color: var(--accent); background: rgba(37,99,235,0.05); }
.nf-card.active { border-color: var(--accent); background: rgba(37,99,235,0.08); }
.nf-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 8px;
}
.nf-numero { font-weight: 700; color: var(--accent); font-family: monospace; }
.nf-total { font-weight: 600; color: var(--success); }
.nf-info { font-size: 0.75rem; color: var(--text-m); display: flex; gap: 15px; flex-wrap: wrap; }

.table-wrapper {
  overflow-x: auto;
  margin-top: 15px;
  max-height: 500px;
  overflow-y: auto;
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.7rem;
}
th, td {
  padding: 6px 8px;
  text-align: left;
  border-bottom: 1px solid var(--border);
}
th {
  background: var(--surface2);
  font-weight: 600;
  font-size: 0.6rem;
  text-transform: uppercase;
  color: var(--text-m);
  position: sticky;
  top: 0;
}
tr:hover td { background: rgba(37,99,235,0.03); }

.chip {
  display: inline-block;
  padding: 2px 6px;
  border-radius: 20px;
  font-size: 0.65rem;
  font-family: monospace;
  background: rgba(37,99,235,0.1);
  color: var(--accent);
}

.info-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 10px;
  margin-bottom: 20px;
}
.info-item {
  background: var(--surface2);
  padding: 10px;
  border-radius: 10px;
}
.info-label { font-size: 0.6rem; text-transform: uppercase; color: var(--text-m); margin-bottom: 4px; }
.info-value { font-weight: 600; font-size: 0.85rem; }

.search-box {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}
.search-box input {
  flex: 1;
  padding: 10px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--surface2);
  font-size: 14px;
}

.btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px; }

.status {
  padding: 12px;
  border-radius: 10px;
  margin-top: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.status-success { background: rgba(5,150,105,0.1); color: var(--success); }
.status-error { background: rgba(220,38,38,0.1); color: var(--danger); }
.status-info { background: rgba(37,99,235,0.1); color: var(--accent); }

.total-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--surface2);
  padding: 15px 20px;
  border-radius: 12px;
  margin-top: 20px;
}
.total-value { font-size: 1.3rem; font-weight: 700; color: var(--accent); }

.stats-badge {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: white;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 0.7rem;
}

.validation-card {
  background: rgba(5,150,105,0.08);
  border: 1px solid rgba(5,150,105,0.2);
  border-radius: 12px;
  padding: 15px;
  margin-top: 15px;
}
.validation-error {
  background: rgba(220,38,38,0.08);
  border-color: rgba(220,38,38,0.2);
}

.pagination {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-top: 20px;
  flex-wrap: wrap;
}
.page-btn {
  padding: 6px 12px;
  border: 1px solid var(--border);
  background: var(--surface2);
  border-radius: 8px;
  cursor: pointer;
  font-size: 12px;
}
.page-btn.active {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}

.filter-stats {
  font-size: 12px;
  color: var(--text-m);
  margin-bottom: 10px;
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">
      <h1>📄 Extrator NF-e UNIVERSAL</h1>
      <p>Funciona com ACF (código no início) e IPIRANGA (códigos separados) · Conta TODOS os itens</p>
    </div>
    <button class="btn btn-outline" onclick="toggleTheme()">🌓 Tema</button>
  </div>

  <div class="card">
    <div class="card-title"><i class="fas fa-paste"></i> Cole o texto COMPLETO da DANFE</div>
    <textarea id="nfTexto" placeholder="Cole aqui o texto completo da NF-e... Funciona com DANFE da ACF, IPIRANGA, etc."></textarea>
    <div class="btn-group">
      <button class="btn btn-primary" onclick="adicionarNF()"><i class="fas fa-plus"></i> Adicionar Nota</button>
      <button class="btn btn-outline" onclick="limparTexto()"><i class="fas fa-eraser"></i> Limpar</button>
    </div>
    <div id="statusMsg"></div>
  </div>

  <div class="card">
    <div class="card-title"><i class="fas fa-list"></i> Notas Fiscais Analisadas</div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="🔍 Pesquisar..." oninput="filtrarNFs()">
      <select id="filterStatus" onchange="filtrarNFs()" style="padding: 10px; border-radius: 10px; background: var(--surface2); border: 1px solid var(--border);">
        <option value="todos">Todos os status</option>
        <option value="ok">✅ Válidas</option>
        <option value="erro">⚠️ Divergentes</option>
      </select>
    </div>
    <div id="filterStats" class="filter-stats"></div>
    <div id="nfListContainer" class="nf-list">
      <div style="text-align: center; padding: 40px;"><i class="fas fa-inbox" style="font-size: 2rem;"></i><p>Nenhuma nota fiscal adicionada</p></div>
    </div>
    <div id="pagination" class="pagination"></div>
    <div class="btn-group">
      <button class="btn btn-success" onclick="exportarTodasNFs()"><i class="fas fa-download"></i> Exportar Todas NFs</button>
      <button class="btn btn-success" onclick="exportarTodosProdutos()"><i class="fas fa-table"></i> Exportar Todos Produtos</button>
      <button class="btn btn-danger" onclick="limparTodasNFs()"><i class="fas fa-trash-alt"></i> Limpar Todas</button>
    </div>
  </div>

  <div class="card" id="detalheCard" style="display: none;">
    <div class="card-title"><i class="fas fa-chart-line"></i> Detalhamento da Nota</div>
    <div id="detalheContent"></div>
  </div>
</div>

<script>
let notasFiscais = [];
let nfSelecionadaId = null;
let currentTheme = 'light';
let currentPage = 1;
const itemsPerPage = 10;
let currentFilter = 'todos';
let currentSearch = '';

// ============================================
// EXTRATOR UNIVERSAL - Funciona com ACF e IPIRANGA
// ============================================

function extrairTodosProdutos(texto) {
  const produtos = [];
  const linhas = texto.split(/\r?\n/);
  
  let dentroTabela = false;
  let paginaAtual = 1;
  let descricaoAcumulada = '';
  let acumulandoDescricao = false;
  let produtoPendente = null;
  
  for (let i = 0; i < linhas.length; i++) {
    let linha = linhas[i].trim();
    if (linha === '') continue;
    
    // Detectar página
    const paginaMatch = linha.match(/Folha\s*(\d+)\/\d+/i);
    if (paginaMatch) {
      paginaAtual = parseInt(paginaMatch[1]);
    }
    
    // Detectar início da tabela de produtos
    if (linha.includes('DADOS DOS PRODUTOS / SERVIÇOS')) {
      dentroTabela = true;
      continue;
    }
    
    // Só processa se estiver dentro da tabela
    if (!dentroTabela) continue;
    
    // Pular cabeçalhos da tabela
    if (linha.includes('CÓD. PROD.') || linha.includes('CÓDIGO PRODUTO') || 
        linha.includes('DESCRIÇÃO DO PRODUTO') || (linha.includes('CFOP') && linha.includes('NCM'))) {
      continue;
    }
    
    // ==========================================
    // FORMATO 1: ACF - Código no início da linha (3-6 dígitos)
    // ==========================================
    const codigoACFMatch = linha.match(/^(\d{3,6})\s/);
    
    if (codigoACFMatch) {
      // Finalizar produto pendente do formato IPIRANGA
      if (produtoPendente) {
        if (produtoPendente.descricao && produtoPendente.descricao.length > 2) {
          produtos.push(produtoPendente);
        }
        produtoPendente = null;
        acumulandoDescricao = false;
        descricaoAcumulada = '';
      }
      
      const codigo = codigoACFMatch[1];
      let restoLinha = linha.substring(codigo.length).trim();
      
      let descricao = '';
      let ncm = '';
      let cfop = '';
      let unidade = 'UN';
      let quantidade = 0;
      let valorUnitario = 0;
      let valorTotal = 0;
      
      // Buscar NCM (8 dígitos)
      const ncmMatch = restoLinha.match(/\b(\d{8})\b/);
      if (ncmMatch) {
        ncm = ncmMatch[1];
        const posNCM = restoLinha.indexOf(ncm);
        descricao = restoLinha.substring(0, posNCM).trim();
        let depoisNCM = restoLinha.substring(posNCM + 8).trim();
        
        // Buscar CFOP (4 dígitos)
        const cfopMatch = depoisNCM.match(/\b(\d{4})\b/);
        if (cfopMatch) {
          cfop = cfopMatch[1];
          depoisNCM = depoisNCM.substring(cfopMatch.index + cfopMatch[0].length).trim();
        }
        
        // Buscar unidade
        const unidadesValidas = ['UN', 'CX', 'PC', 'KG', 'LT', 'M', 'UND', 'PCA', 'FD', 'JG', 'MIL', 'UN1', 'SC', 'PT', 'TON'];
        const unMatch = depoisNCM.match(new RegExp(`\\b(${unidadesValidas.join('|')})\\b`, 'i'));
        if (unMatch) {
          unidade = unMatch[1].toUpperCase();
          depoisNCM = depoisNCM.substring(unMatch.index + unMatch[0].length).trim();
        }
        
        // Extrair números
        const numMatches = depoisNCM.match(/(\d+[.,]\d+)/g);
        const numeros = [];
        if (numMatches) {
          for (const num of numMatches) {
            let valor = parseFloat(num.replace(/\./g, '').replace(',', '.'));
            if (!isNaN(valor)) {
              numeros.push(valor);
            }
          }
        }
        
        if (numeros.length >= 3) {
          quantidade = numeros[0];
          valorUnitario = numeros[1];
          valorTotal = numeros[2];
        } else if (numeros.length === 2) {
          if (numeros[0] > 0 && numeros[0] < 1000 && numeros[1] > numeros[0]) {
            quantidade = numeros[0];
            valorTotal = numeros[1];
            valorUnitario = valorTotal / quantidade;
          } else {
            valorUnitario = numeros[0];
            valorTotal = numeros[1];
            quantidade = 1;
          }
        } else if (numeros.length === 1) {
          valorTotal = numeros[0];
          quantidade = 1;
          valorUnitario = valorTotal;
        }
      } else {
        descricao = restoLinha.substring(0, 60).trim();
      }
      
      descricao = descricao.replace(/\s+/g, ' ').substring(0, 80);
      
      if (descricao && descricao.length > 2) {
        produtos.push({
          codigo: codigo,
          descricao: descricao,
          ncm: ncm,
          cfop: cfop,
          unidade: unidade,
          quantidade: quantidade,
          valorUnitario: valorUnitario,
          valorTotal: valorTotal,
          pagina: paginaAtual
        });
      }
      continue;
    }
    
    // ==========================================
    // FORMATO 2: IPIRANGA - Linha com "CÓD. PROD." e depois valores no final
    // ==========================================
    // Verificar se a linha tem o padrão: código1 código2 descrição longa... e no final números
    if (linha.includes('CÓD. PROD.') || linha.match(/^\d{8}\s+\d{9}/)) {
      // Finalizar produto pendente
      if (produtoPendente) {
        if (produtoPendente.descricao && produtoPendente.descricao.length > 2) {
          produtos.push(produtoPendente);
        }
        produtoPendente = null;
        acumulandoDescricao = false;
        descricaoAcumulada = '';
      }
      
      // Extrair códigos
      const partes = linha.split(/\s+/);
      let codigoProduto = '';
      let codigoANP = '';
      
      // Primeiros dois campos são os códigos
      if (partes.length >= 2) {
        codigoProduto = partes[0];
        codigoANP = partes[1];
      }
      
      // O resto da linha é a descrição + valores
      let resto = linha.substring(codigoProduto.length + codigoANP.length + 2).trim();
      
      // Procurar números no final (quantidade, unitário, total)
      const numerosNoFinal = resto.match(/(\d+[.,]\d+)\s+(\d+[.,]\d+)\s+(\d+[.,]\d+)\s*$/);
      
      let quantidade = 0, valorUnitario = 0, valorTotal = 0;
      let descricao = resto;
      
      if (numerosNoFinal) {
        quantidade = parseFloat(numerosNoFinal[1].replace(/\./g, '').replace(',', '.'));
        valorUnitario = parseFloat(numerosNoFinal[2].replace(/\./g, '').replace(',', '.'));
        valorTotal = parseFloat(numerosNoFinal[3].replace(/\./g, '').replace(',', '.'));
        descricao = resto.substring(0, resto.indexOf(numerosNoFinal[0])).trim();
      }
      
      // Para IPIRANGA, pode ter NCM e CFOP
      let ncm = '';
      let cfop = '';
      const ncmMatch = descricao.match(/\b(\d{8})\b/);
      if (ncmMatch) {
        ncm = ncmMatch[1];
      }
      const cfopMatch = descricao.match(/\b(\d{4})\b/);
      if (cfopMatch) {
        cfop = cfopMatch[1];
      }
      
      descricao = descricao.replace(/\s+/g, ' ').substring(0, 80);
      
      if (descricao && descricao.length > 2) {
        produtos.push({
          codigo: codigoProduto + (codigoANP ? '/' + codigoANP : ''),
          descricao: descricao,
          ncm: ncm,
          cfop: cfop,
          unidade: 'L', // Diesel em litros
          quantidade: quantidade,
          valorUnitario: valorUnitario,
          valorTotal: valorTotal,
          pagina: paginaAtual
        });
      }
      continue;
    }
    
    // ==========================================
    // FORMATO 3: IPIRANGA com descrição em múltiplas linhas
    // ==========================================
    // Se já estamos acumulando descrição e a linha parece ser continuação
    if (acumulandoDescricao && linha.length > 20 && !linha.match(/^\d/)) {
      descricaoAcumulada += ' ' + linha;
      continue;
    }
    
    // Verificar se é uma linha que contém quantidade (final com números)
    const numerosFinais = linha.match(/(\d+[.,]\d+)\s+(\d+[.,]\d+)\s+(\d+[.,]\d+)\s*$/);
    if (numerosFinais && !linha.match(/^(\d{6})/)) {
      // Pode ser a continuação de um produto IPIRANGA
      if (produtoPendente) {
        produtoPendente.descricao += ' ' + linha.substring(0, linha.indexOf(numerosFinais[0])).trim();
        produtoPendente.quantidade = parseFloat(numerosFinais[1].replace(/\./g, '').replace(',', '.'));
        produtoPendente.valorUnitario = parseFloat(numerosFinais[2].replace(/\./g, '').replace(',', '.'));
        produtoPendente.valorTotal = parseFloat(numerosFinais[3].replace(/\./g, '').replace(',', '.'));
        produtoPendente.descricao = produtoPendente.descricao.replace(/\s+/g, ' ').substring(0, 80);
        
        produtos.push(produtoPendente);
        produtoPendente = null;
        acumulandoDescricao = false;
        descricaoAcumulada = '';
      }
    }
  }
  
  // Adicionar último produto pendente
  if (produtoPendente && produtoPendente.descricao && produtoPendente.descricao.length > 2) {
    produtos.push(produtoPendente);
  }
  
  console.log(`Total de produtos extraídos: ${produtos.length}`);
  return produtos;
}

function extrairDadosNF(texto) {
  const dados = {
    id: Date.now(),
    numero: 'N/I',
    serie: 'N/I',
    emitente: 'N/I',
    cnpjEmitente: 'N/I',
    destinatario: 'N/I',
    cnpjDestinatario: 'N/I',
    dataEmissao: 'N/I',
    valorTotalProdutos: 0,
    valorFrete: 0,
    valorDesconto: 0,
    valorTotalNota: 0,
    paginas: 1,
    produtos: [],
    validacao: { ok: false, diferenca: 0, mensagem: '' }
  };
  
  // Extrair número da NF
  let numMatch = texto.match(/N[ºo°]\.?\s*(\d{3}\.\d{3}\.\d{3})/i);
  if (!numMatch) numMatch = texto.match(/NF-e?\s*N[ºo°]?\s*(\d{3,}\.?\d{0,3}\.?\d{0,3})/i);
  if (!numMatch) numMatch = texto.match(/N[ºo°]\s+(\d{3}\.\d{3}\.\d{3})/i);
  if (numMatch) dados.numero = numMatch[1];
  
  // Extrair série
  const serieMatch = texto.match(/S[ÉE]RIE\s*(\d+)/i);
  if (serieMatch) dados.serie = serieMatch[1];
  
  // Extrair data
  const dataMatch = texto.match(/EMISS[ÃA]O:\s*(\d{2}\/\d{2}\/\d{4})/i);
  if (dataMatch) dados.dataEmissao = dataMatch[1];
  
  // Extrair emitente
  let emitMatch = texto.match(/IDENTIFICAÇÃO DO EMITENTE\s*\n\s*([^\n]+)/i);
  if (!emitMatch) emitMatch = texto.match(/IPIRANGA[^-\n]+/i);
  if (!emitMatch) emitMatch = texto.match(/([A-Z][A-Z\s]{5,50}LTDA)/i);
  if (emitMatch) dados.emitente = emitMatch[1].trim();
  
  // Extrair CNPJ
  const cnpjPattern = /\d{2}\.\d{3}\.\d{3}\/\d{4}-\d{2}/g;
  const cnpjs = texto.match(cnpjPattern);
  if (cnpjs && cnpjs.length >= 1) dados.cnpjEmitente = cnpjs[0];
  if (cnpjs && cnpjs.length >= 2) dados.cnpjDestinatario = cnpjs[1];
  
  // Extrair destinatário
  const destMatch = texto.match(/DESTINAT[ÁA]RIO[^:]*:\s*([^\n]{10,80})/i);
  if (destMatch) dados.destinatario = destMatch[1].trim();
  
  // Extrair valores do cabeçalho
  const valorProdutosMatch = texto.match(/VALOR TOTAL DOS PRODUTOS\s*([\d\.]+,\d{2})/i);
  if (valorProdutosMatch) {
    dados.valorTotalProdutos = parseFloat(valorProdutosMatch[1].replace(/\./g, '').replace(',', '.'));
  }
  
  const totalNotaMatch = texto.match(/VALOR TOTAL DA NOTA\s*([\d\.]+,\d{2})/i);
  if (totalNotaMatch) {
    dados.valorTotalNota = parseFloat(totalNotaMatch[1].replace(/\./g, '').replace(',', '.'));
  }
  
  const freteMatch = texto.match(/VALOR DO FRETE\s*([\d\.]+,\d{2})/i);
  if (freteMatch) {
    dados.valorFrete = parseFloat(freteMatch[1].replace(/\./g, '').replace(',', '.'));
  }
  
  const descontoMatch = texto.match(/DESCONTO\s*([\d\.]+,\d{2})/i);
  if (descontoMatch) {
    dados.valorDesconto = parseFloat(descontoMatch[1].replace(/\./g, '').replace(',', '.'));
  }
  
  // Contar páginas
  const paginasMatch = texto.match(/Folha\s*\d+\/(\d+)/gi);
  if (paginasMatch) {
    const maxPagina = Math.max(...paginasMatch.map(p => parseInt(p.split('/')[1])));
    dados.paginas = maxPagina;
  }
  
  // Extrair produtos
  dados.produtos = extrairTodosProdutos(texto);
  
  // Calcular total dos produtos extraídos
  const somaProdutos = dados.produtos.reduce((s, p) => s + p.valorTotal, 0);
  
  // Validar cálculos
  const totalCalculado = somaProdutos + dados.valorFrete - dados.valorDesconto;
  const diferenca = Math.abs(totalCalculado - dados.valorTotalNota);
  const tolerancia = 1.00; // 1 real de tolerância para valores grandes
  
  if (dados.valorTotalNota > 0) {
    if (diferenca <= tolerancia) {
      dados.validacao = { ok: true, diferenca: 0, mensagem: '✅ VALIDAÇÃO OK: Os valores batem!' };
    } else {
      dados.validacao = { 
        ok: false, 
        diferenca: diferenca, 
        mensagem: `⚠️ DIVERGÊNCIA: Produtos R$ ${somaProdutos.toFixed(2)} + Frete R$ ${dados.valorFrete.toFixed(2)} - Desconto R$ ${dados.valorDesconto.toFixed(2)} = R$ ${totalCalculado.toFixed(2)} | Nota declara R$ ${dados.valorTotalNota.toFixed(2)} | Diferença de R$ ${diferenca.toFixed(2)}` 
      };
    }
  } else {
    dados.validacao = { ok: true, diferenca: 0, mensagem: 'ℹ️ Não foi possível validar (valores do cabeçalho não encontrados)' };
  }
  
  return dados;
}

// ============================================
// GERENCIAMENTO (igual ao anterior)
// ============================================

function adicionarNF() {
  const texto = document.getElementById('nfTexto').value.trim();
  if (!texto) {
    mostrarStatus('Cole o texto da nota fiscal primeiro!', 'error');
    return;
  }
  
  mostrarStatus('Processando nota fiscal...', 'info');
  
  setTimeout(() => {
    try {
      const nf = extrairDadosNF(texto);
      
      if (nf.produtos.length === 0) {
        mostrarStatus('⚠️ Nenhum produto encontrado! Verifique o texto colado.', 'error');
        return;
      }
      
      notasFiscais.unshift(nf);
      nfSelecionadaId = nf.id;
      salvarLocalStorage();
      currentPage = 1;
      filtrarNFs();
      exibirDetalheNF(nf.id);
      document.getElementById('nfTexto').value = '';
      
      const somaProdutos = nf.produtos.reduce((s, p) => s + p.valorTotal, 0);
      mostrarStatus(`✅ Nota ${nf.numero} adicionada! ${nf.produtos.length} produtos encontrados. Total produtos: R$ ${somaProdutos.toFixed(2)} | Nota: R$ ${nf.valorTotalNota.toFixed(2)}`, 'success');
    } catch(e) {
      mostrarStatus('Erro ao processar: ' + e.message, 'error');
      console.error(e);
    }
  }, 100);
}

function getNotasFiltradas() {
  let filtradas = notasFiscais;
  if (currentSearch) {
    filtradas = filtradas.filter(nf => 
      nf.numero.toLowerCase().includes(currentSearch) ||
      nf.emitente.toLowerCase().includes(currentSearch) ||
      nf.destinatario.toLowerCase().includes(currentSearch)
    );
  }
  if (currentFilter === 'ok') {
    filtradas = filtradas.filter(nf => nf.validacao.ok === true);
  } else if (currentFilter === 'erro') {
    filtradas = filtradas.filter(nf => nf.validacao.ok === false && nf.validacao.diferenca > 0);
  }
  return filtradas;
}

function filtrarNFs() {
  currentSearch = document.getElementById('searchInput').value.toLowerCase();
  currentFilter = document.getElementById('filterStatus').value;
  currentPage = 1;
  atualizarListaNFs();
}

function atualizarListaNFs() {
  const container = document.getElementById('nfListContainer');
  const filtradas = getNotasFiltradas();
  const totalFiltradas = filtradas.length;
  const totalPages = Math.ceil(totalFiltradas / itemsPerPage);
  
  const totalOk = notasFiscais.filter(nf => nf.validacao.ok === true).length;
  const totalErro = notasFiscais.filter(nf => nf.validacao.ok === false && nf.validacao.diferenca > 0).length;
  document.getElementById('filterStats').innerHTML = `📊 Total: ${notasFiscais.length} notas | ✅ Válidas: ${totalOk} | ⚠️ Divergentes: ${totalErro} | 📄 Mostrando: ${totalFiltradas}`;
  
  const start = (currentPage - 1) * itemsPerPage;
  const paginadas = filtradas.slice(start, start + itemsPerPage);
  
  if (paginadas.length === 0) {
    container.innerHTML = '<div style="text-align: center; padding: 40px;"><i class="fas fa-search"></i><p>Nenhuma nota encontrada</p></div>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }
  
  container.innerHTML = paginadas.map(nf => {
    const somaProdutos = nf.produtos.reduce((s, p) => s + p.valorTotal, 0);
    const statusIcon = nf.validacao.ok ? '✅' : '⚠️';
    const statusColor = nf.validacao.ok ? 'var(--success)' : 'var(--warning)';
    return `
      <div class="nf-card ${nfSelecionadaId === nf.id ? 'active' : ''}" onclick="selecionarNF(${nf.id})">
        <div class="nf-header">
          <span class="nf-numero">📄 NF-e ${nf.numero}</span>
          <span class="nf-total">💰 R$ ${somaProdutos.toFixed(2)}</span>
          <span class="stats-badge">${nf.produtos.length} itens</span>
          <span class="stats-badge" style="background: ${statusColor}">${statusIcon} ${nf.paginas} pág(s)</span>
        </div>
        <div class="nf-info">
          <span><i class="fas fa-building"></i> ${nf.emitente.substring(0, 40)}</span>
          <span><i class="fas fa-user"></i> ${nf.destinatario.substring(0, 30)}</span>
          <span><i class="fas fa-calendar"></i> ${nf.dataEmissao}</span>
        </div>
        <div style="font-size: 11px; margin-top: 5px; color: ${statusColor}">
          ${nf.validacao.mensagem.substring(0, 80)}${nf.validacao.mensagem.length > 80 ? '...' : ''}
        </div>
      </div>
    `;
  }).join('');
  
  let pagHtml = '';
  for (let i = 1; i <= Math.min(totalPages, 20); i++) {
    pagHtml += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="irPagina(${i})">${i}</button>`;
  }
  document.getElementById('pagination').innerHTML = pagHtml;
}

function irPagina(pagina) {
  currentPage = pagina;
  atualizarListaNFs();
}

function selecionarNF(id) {
  nfSelecionadaId = id;
  atualizarListaNFs();
  exibirDetalheNF(id);
}

function limparTodasNFs() {
  if (confirm('Tem certeza que deseja remover TODAS as notas?')) {
    notasFiscais = [];
    nfSelecionadaId = null;
    salvarLocalStorage();
    atualizarListaNFs();
    document.getElementById('detalheCard').style.display = 'none';
    mostrarStatus('Todas as notas foram removidas', 'success');
  }
}

function exibirDetalheNF(id) {
  const nf = notasFiscais.find(n => n.id === id);
  if (!nf) return;
  
  document.getElementById('detalheCard').style.display = 'block';
  const somaProdutos = nf.produtos.reduce((s, p) => s + p.valorTotal, 0);
  const totalCalculado = somaProdutos + nf.valorFrete - nf.valorDesconto;
  
  let validationClass = '';
  if (nf.validacao.ok) validationClass = 'validation-card';
  else if (nf.validacao.diferenca > 0) validationClass = 'validation-card validation-error';
  
  let html = `
    <div class="info-grid">
      <div class="info-item"><div class="info-label">Número</div><div class="info-value">${nf.numero}</div></div>
      <div class="info-item"><div class="info-label">Série</div><div class="info-value">${nf.serie}</div></div>
      <div class="info-item"><div class="info-label">Data Emissão</div><div class="info-value">${nf.dataEmissao}</div></div>
      <div class="info-item"><div class="info-label">Páginas</div><div class="info-value">${nf.paginas} página(s)</div></div>
      <div class="info-item"><div class="info-label">Emitente</div><div class="info-value">${nf.emitente}</div></div>
      <div class="info-item"><div class="info-label">CNPJ Emitente</div><div class="info-value">${nf.cnpjEmitente}</div></div>
      <div class="info-item"><div class="info-label">Destinatário</div><div class="info-value">${nf.destinatario}</div></div>
      <div class="info-item"><div class="info-label">CNPJ Destinatário</div><div class="info-value">${nf.cnpjDestinatario}</div></div>
    </div>
    
    <div class="${validationClass}">
      <strong>📊 VALIDAÇÃO DA NOTA FISCAL</strong><br>
      ${nf.validacao.mensagem}<br><br>
      <table style="width: 100%; font-size: 12px;">
        <tr><td style="width: 40%;">💰 Soma dos produtos extraídos:</td><td><strong>R$ ${somaProdutos.toFixed(2)}</strong></td></tr>
        <tr><td>🚚 Valor do Frete:</td><td>R$ ${nf.valorFrete.toFixed(2)}</td></tr>
        <tr><td>🏷️ Desconto:</td><td>R$ ${nf.valorDesconto.toFixed(2)}</td></tr>
        <tr style="border-top: 1px solid var(--border);"><td><strong>📝 Total calculado:</strong></td><td><strong>R$ ${totalCalculado.toFixed(2)}</strong></td></tr>
        <tr><td>📄 Valor declarado na NF:</td><td><strong>R$ ${nf.valorTotalNota.toFixed(2)}</strong></td></tr>
        ${!nf.validacao.ok && nf.validacao.diferenca > 0 ? `<tr style="color: var(--danger);"><td>⚠️ Diferença:</td><td><strong>R$ ${nf.validacao.diferenca.toFixed(2)}</strong></td></tr>` : ''}
      </table>
    </div>
    
    <div class="table-wrapper">
      <table>
        <thead>
          <tr><th>#</th><th>Código</th><th>Descrição</th><th>CFOP</th><th>UN</th><th>Qtd</th><th>V. Unit.</th><th>V. Total</th><th>Pág</th></tr>
        </thead>
        <tbody>
  `;
  
  nf.produtos.forEach((p, idx) => {
    html += `<tr>
      <td style="text-align: center;">${idx + 1}</td>
      <td style="font-family: monospace; font-weight: bold;">${p.codigo}</td>
      <td style="max-width: 400px;">${p.descricao}</td>
      <td style="text-align: center;">${p.cfop || '-'}</td>
      <td style="text-align: center;">${p.unidade}</td>
      <td style="text-align: right;">${p.quantidade.toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 4})}</td>
      <td style="text-align: right;">R$ ${p.valorUnitario.toFixed(4)}</td>
      <td style="text-align: right;"><strong>R$ ${p.valorTotal.toFixed(2)}</strong></td>
      <td style="text-align: center;">${p.pagina || '-'}</td>
    </tr>`;
  });
  
  html += `</tbody>
      </table>
    </div>
    <div class="total-bar">
      <span>💰 TOTAL DE PRODUTOS EXTRAÍDOS: <strong style="font-size: 1.2rem;">${nf.produtos.length} itens</strong></span>
      <span class="total-value">R$ ${somaProdutos.toFixed(2)}</span>
    </div>`;
  
  document.getElementById('detalheContent').innerHTML = html;
}

function exportarTodasNFs() {
  if (notasFiscais.length === 0) { mostrarStatus('Nenhuma nota para exportar', 'error'); return; }
  const headers = ['Número NF', 'Série', 'Data', 'Emitente', 'CNPJ', 'Destinatário', 'Total Produtos', 'Frete', 'Desconto', 'Total Nota', 'Qtd Produtos', 'Páginas', 'Validação'];
  const rows = notasFiscais.map(nf => {
    const soma = nf.produtos.reduce((s, p) => s + p.valorTotal, 0);
    return [nf.numero, nf.serie, nf.dataEmissao, nf.emitente, nf.cnpjEmitente, nf.destinatario, 
            `R$ ${soma.toFixed(2)}`, `R$ ${nf.valorFrete.toFixed(2)}`, `R$ ${nf.valorDesconto.toFixed(2)}`,
            `R$ ${nf.valorTotalNota.toFixed(2)}`, nf.produtos.length, nf.paginas, nf.validacao.ok ? 'OK' : 'DIVERGENTE'];
  });
  const csv = [headers, ...rows].map(r => r.join(';')).join('\n');
  downloadCSV(csv, `Todas_NFs.csv`);
  mostrarStatus('Exportado!', 'success');
}

function exportarTodosProdutos() {
  if (notasFiscais.length === 0) { mostrarStatus('Nenhum produto para exportar', 'error'); return; }
  const headers = ['NF', 'Emitente', 'Destinatário', 'Código', 'Descrição', 'CFOP', 'UN', 'Qtd', 'V.Unitário', 'V.Total', 'Página'];
  const rows = [];
  notasFiscais.forEach(nf => {
    nf.produtos.forEach(p => {
      rows.push([nf.numero, nf.emitente, nf.destinatario, p.codigo, p.descricao, p.cfop, p.unidade, 
                 p.quantidade, p.valorUnitario.toFixed(4), p.valorTotal.toFixed(2), p.pagina || '']);
    });
  });
  const csv = [headers, ...rows].map(r => r.join(';')).join('\n');
  downloadCSV(csv, `Todos_Produtos.csv`);
  mostrarStatus(`${rows.length} produtos exportados!`, 'success');
}

function downloadCSV(content, filename) {
  const blob = new Blob(["\uFEFF" + content], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = filename;
  link.click();
  URL.revokeObjectURL(link.href);
}

function mostrarStatus(msg, tipo) {
  const div = document.getElementById('statusMsg');
  div.innerHTML = `<div class="status status-${tipo}"><i class="fas ${tipo === 'info' ? 'fa-spinner fa-pulse' : 'fa-check-circle'}"></i> ${msg}</div>`;
  setTimeout(() => div.innerHTML = '', 5000);
}

function limparTexto() { document.getElementById('nfTexto').value = ''; }
function salvarLocalStorage() { localStorage.setItem('notasFiscaisCompleto', JSON.stringify(notasFiscais)); }
function carregarLocalStorage() {
  const saved = localStorage.getItem('notasFiscaisCompleto');
  if (saved) { 
    notasFiscais = JSON.parse(saved); 
    if (notasFiscais.length) { 
      nfSelecionadaId = notasFiscais[0].id; 
      atualizarListaNFs(); 
      exibirDetalheNF(nfSelecionadaId); 
    } 
  }
}

function toggleTheme() { 
  currentTheme = currentTheme === 'light' ? 'dark' : 'light'; 
  document.documentElement.setAttribute('data-theme', currentTheme);
  if (currentTheme === 'dark') {
    document.documentElement.style.setProperty('--bg', '#0f172a');
    document.documentElement.style.setProperty('--surface', '#1e293b');
    document.documentElement.style.setProperty('--surface2', '#334155');
    document.documentElement.style.setProperty('--text', '#f1f5f9');
    document.documentElement.style.setProperty('--text-m', '#94a3b8');
    document.documentElement.style.setProperty('--border', 'rgba(255,255,255,0.1)');
  } else {
    document.documentElement.style.setProperty('--bg', '#f0f4fb');
    document.documentElement.style.setProperty('--surface', '#ffffff');
    document.documentElement.style.setProperty('--surface2', '#f4f7fd');
    document.documentElement.style.setProperty('--text', '#1e293b');
    document.documentElement.style.setProperty('--text-m', '#64748b');
    document.documentElement.style.setProperty('--border', 'rgba(37,99,235,0.12)');
  }
}

carregarLocalStorage();
</script>
